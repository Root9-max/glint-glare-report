<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up — Glint &amp; Glare Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="config.js" defer></script>
  <script src="auth.js" defer></script>
</head>
<body>

  <header class="site-header">
    <div class="wrap header-inner">
      <div class="brand">
        <a href="index.html" style="text-decoration:none; display:flex; align-items:center; gap:10px;">
          <span class="brand-mark" aria-hidden="true"></span>
          <span class="brand-name">Glint &amp; Glare Report</span>
        </a>
      </div>
      <nav class="auth-nav">
        <a href="login.html" id="navLogin">Log in</a>
        <a href="signup.html" id="navSignup">Sign up</a>
        <a href="dashboard.html" id="navDashboard" hidden>My Reports</a>
        <a href="admin.html" id="navAdmin" hidden>Admin</a>
        <span id="navEmail" class="nav-email" hidden></span>
        <button id="navLogout" class="nav-logout" hidden>Log out</button>
      </nav>
    </div>
  </header>

  <main class="wrap auth-main">
    <section class="panel auth-panel">
      <h2 class="panel-heading"><span class="panel-index">Create account</span></h2>

      <form id="signupForm" class="glare-form" autocomplete="off">
        <div class="field">
          <label for="fullName">Full name</label>
          <input type="text" id="fullName" name="fullName" required>
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" minlength="6" required>
        </div>
        <button type="submit" class="btn-primary">Sign up</button>
        <p id="signupStatus" class="save-status" aria-live="polite"></p>
      </form>

      <p class="auth-switch">Already have an account? <a href="login.html">Log in</a></p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p>Built for site assessment. Not a substitute for a certified glare study where regulation requires one.</p>
    </div>
  </footer>

  <script>
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const status = document.getElementById('signupStatus');
      if (!window.db) {
        status.textContent = 'Database not configured yet — see config.js.';
        return;
      }
      status.textContent = 'Creating account…';
      const fullName = document.getElementById('fullName').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const { data, error } = await window.db.auth.signUp({
        email,
        password,
        options: { data: { full_name: fullName } },
      });

      if (error) {
        status.textContent = `Sign up failed: ${error.message}`;
        return;
      }

      // Depending on your Supabase project's email settings, the user
      // may need to confirm their email before they can log in.
      if (data.session) {
        window.location.href = 'dashboard.html';
      } else {
        status.textContent = 'Account created — check your email to confirm before logging in.';
      }
    });
  </script>
</body>
</html>
